<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJOK SDN 1 PARIGI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #2c3e50 0%, #bdc3c7 40%, #d4af37 100%); background-attachment: fixed; min-height: 100vh; }
        body.dark { background: linear-gradient(135deg, #1a1a1a 0%, #333333 50%, #4a4a4a 100%); }
        @keyframes blink { 50% { opacity: 0.3; } }
        .blink { animation: blink 1.5s linear infinite; }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { 'charcoal': '#1A1A1A', 'light-gold': '#D4AF37', 'rich-sea-blue': '#006994', 'soft-gray': '#F1F1F1', 'darkmode-card': '#252525', 'darkmode-text': '#E5E5E5' } } }
        }
    </script>
</head>
<body class="text-charcoal dark:text-soft-gray transition-colors duration-300 font-sans min-h-screen pb-10">

    <div class="max-w-2xl mx-auto p-4">
        <header class="flex justify-between items-center mb-6 border-b-2 border-light-gold pb-2 bg-white/80 dark:bg-black/40 p-4 rounded-2xl shadow-lg">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <img src="https://i.ibb.co.com/vxKhpF50/6ae92db4-8e81-4a1a-9b35-a218c706dd42-2.png" alt="Logo" class="w-10 h-10 rounded-full border-2 border-white object-cover shadow-sm">
                <span class="text-charcoal dark:text-white">PJOK</span>
                <span class="text-rich-sea-blue dark:text-blue-400">SDN 1</span>
                <span class="text-light-gold">PARIGI</span>
            </h1>
            <button id="theme-toggle" class="p-2 rounded-xl bg-soft-gray dark:bg-gray-700 text-charcoal dark:text-light-gold transition-all font-bold">☀️/🌙</button>
        </header>

        <section class="bg-white/90 dark:bg-darkmode-card p-4 rounded-2xl shadow-sm mb-4 flex items-center gap-4 border border-gray-100 dark:border-gray-700">
            <div id="avatar" onclick="changeAvatar()" class="text-4xl cursor-pointer hover:scale-110 transition-transform bg-gray-200 dark:bg-gray-700 p-2 rounded-full w-16 h-16 flex items-center justify-center">🐸</div>
            <div class="flex-1">
                <input id="murid-name" type="text" placeholder="Masukkan Nama Murid" class="w-full bg-transparent font-bold text-lg outline-none border-b border-gray-200 dark:border-gray-600 focus:border-rich-sea-blue dark:text-white">
            </div>
        </section>

        <!-- Chat AI Section -->
        <section class="mb-6">
            <div id="ai-card" class="bg-[#7CA982] p-5 rounded-[32px] text-white shadow-lg border-2 border-white/20">
                <button id="start-chat-btn" onclick="openChat()" class="w-full bg-white text-[#7CA982] font-bold py-3 rounded-2xl">💬 Tanya Si AGBI</button>
                <div id="chat-interface" class="hidden mt-4 bg-black/10 p-3 rounded-2xl border border-white/20">
                    <div id="chat-history" class="space-y-4 mb-3 h-48 overflow-y-auto pr-2 scrollbar-thin"></div>
                    <div class="flex gap-2">
                        <input id="chat-input" type="text" placeholder="Tanya..." class="flex-1 p-2 rounded-xl text-charcoal outline-none text-sm">
                        <button onclick="sendToGemini()" class="px-4 py-2 bg-white text-[#7CA982] rounded-xl font-bold">Kirim</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="mb-6">
            <h2 class="text-lg font-semibold mb-3 text-black dark:text-blue-300">📅 Jadwal & Cuaca</h2>
            <div id="schedule-grid" class="grid grid-cols-5 gap-1.5 text-center"></div>
        </section>

        <section class="mb-6">
            <h2 class="text-lg font-semibold mb-3 text-black dark:text-blue-300">🎓 Kelompok Kelas</h2>
            <div id="materiContainer" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section>
            <h2 class="text-lg font-semibold mb-3 text-black dark:text-blue-300">🎮 Zona Permainan</h2>
            <div class="grid grid-cols-2 gap-3">
                <button id="game-rendah" onclick="handleGameClick('rendah')" class="p-3 rounded-3xl bg-indigo-500 text-black border border-indigo-600 font-bold text-[11px]">Kls Rendah <span id="status-rendah" class="block opacity-80">...</span></button>
                <button id="game-tinggi" onclick="handleGameClick('tinggi')" class="p-3 rounded-3xl bg-pink-500 text-black border border-pink-600 font-bold text-[11px]">Kls Tinggi <span id="status-tinggi" class="block opacity-80">...</span></button>
            </div>
        </section>
    </div>

    <script>
        const avatars = ['🐸', '🐶', '🐱', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🦁', '🐯', '🐮'];
        function changeAvatar() { document.getElementById('avatar').textContent = avatars[Math.floor(Math.random() * avatars.length)]; }
        function openChat() { document.getElementById('start-chat-btn').classList.add('hidden'); document.getElementById('chat-interface').classList.remove('hidden'); }
        
        // Data & UI Logic
        const KELOMPOK_DATA = [
            { id: 1, label: 'KELAS 1', icon: '⚽', color: 'bg-red-500', cardBg: 'bg-red-200' },
            { id: 2, label: 'KELAS 2', icon: '🏀', color: 'bg-orange-500', cardBg: 'bg-orange-200' },
            { id: 3, label: 'KELAS 3', icon: '🎾', color: 'bg-yellow-500', cardBg: 'bg-yellow-200' },
            { id: 4, label: 'KELAS 4', icon: '🏸', color: 'bg-green-500', cardBg: 'bg-green-200' },
            { id: 5, label: 'KELAS 5', icon: '🏐', color: 'bg-cyan-500', cardBg: 'bg-cyan-200' },
            { id: 6, label: 'KELAS 6', icon: '🏆', color: 'bg-violet-500', cardBg: 'bg-violet-200' },
        ];

        function renderBaseUI() {
            document.getElementById('materiContainer').innerHTML = KELOMPOK_DATA.map(cls => `
                <div class="p-4 rounded-3xl ${cls.cardBg} border border-white/50 flex items-center gap-3">
                    <div class="w-10 h-10 ${cls.color} rounded-2xl flex items-center justify-center text-white text-xl">${cls.icon}</div>
                    <div><h4 class="font-bold text-sm text-black">${cls.label}</h4></div>
                </div>
            `).join('');
            
            // Render Jadwal
            const grid = document.getElementById('schedule-grid');
            const jadwalMingguan = { 1: "Kls 3", 2: "Kls 4", 3: "Kls 5", 4: "Kls 6", 5: "Kls 1&2" };
            for(let i = 1; i <= 5; i++) {
                grid.innerHTML += `<div class="bg-white/50 p-2 rounded-lg text-[9px] font-bold">${i}<br>${jadwalMingguan[i]}</div>`;
            }
        }

        document.getElementById('theme-toggle').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
        renderBaseUI();
    </script>
</body>
</html>
