<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJOK SDN 1 PARIGI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #2c3e50 0%, #bdc3c7 40%, #d4af37 100%); background-attachment: fixed; min-height: 100vh; }
        body.dark { background: linear-gradient(135deg, #1a1a1a 0%, #333333 50%, #4a4a4a 100%); }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    </style>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="text-charcoal dark:text-white transition-colors duration-300 font-sans min-h-screen pb-10">

    <div class="max-w-2xl mx-auto p-4">
        <header class="flex justify-between items-center mb-6 border-b-2 border-light-gold pb-2 bg-white/80 dark:bg-black/40 p-4 rounded-2xl shadow-lg">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <img src="https://i.ibb.co.com/vxKhpF50/6ae92db4-8e81-4a1a-9b35-a218c706dd42-2.png" alt="Logo" class="w-10 h-10 rounded-full border-2 border-white object-cover shadow-sm">
                <span>PJOK SDN 1 PARIGI</span>
            </h1>
        </header>

        <section class="mb-6">
            <div id="ai-card" class="bg-[#7CA982] p-5 rounded-[32px] text-white shadow-lg border-2 border-white/20">
                <button id="start-chat-btn" onclick="openChat()" class="w-full bg-white text-[#7CA982] font-bold py-3 rounded-2xl">💬 Tanya Si AGBI</button>
                
                <div id="chat-interface" class="hidden mt-4 bg-black/10 p-3 rounded-2xl border border-white/20">
                    <div id="chat-history" class="space-y-4 mb-3 h-48 overflow-y-auto text-sm pr-2 scrollbar-thin">
                        <div class="flex items-start gap-2">
                            <p class="bg-white/10 p-3 rounded-2xl rounded-tl-none">Halo! Saya Si AGBI, apa yang ingin kamu tanyakan hari ini?</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <input id="chat-input" type="text" placeholder="Tulis pertanyaan..." class="flex-1 p-2 rounded-xl text-charcoal outline-none text-sm">
                        <button onclick="handleSend()" class="px-4 py-2 bg-white text-[#7CA982] rounded-xl font-bold text-sm">Kirim</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        function openChat() { 
            document.getElementById('start-chat-btn').classList.add('hidden'); 
            document.getElementById('chat-interface').classList.remove('hidden'); 
        }

        async function handleSend() {
            const input = document.getElementById('chat-input');
            const history = document.getElementById('chat-history');
            const userText = input.value.trim();
            if (!userText) return;
            
            // Tampilkan pesan user di layar
            history.innerHTML += `<div class="text-right"><p class="bg-blue-500 p-2 rounded-lg inline-block text-white">${userText}</p></div>`;
            input.value = '';

            // Kirim ke AI
            await kirimKeAI(userText);
        }

        async function kirimKeAI(pesan) {
            try {
                const response = await fetch('/.netlify/functions/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: pesan })
                });
                const data = await response.json();
                
                // Tampilkan jawaban AI ke layar
                const history = document.getElementById('chat-history');
                history.innerHTML += `<div class="flex items-start gap-2"><p class="bg-black/20 p-2 rounded-lg text-white">${data.reply}</p></div>`;
                history.scrollTop = history.scrollHeight;
            } catch (e) {
                console.error("Gagal terhubung ke AI:", e);
                const history = document.getElementById('chat-history');
                history.innerHTML += `<p class="text-red-300 text-xs">Maaf, Si AGBI sedang gangguan.</p>`;
            }
        }
    </script>
</body>
</html>
